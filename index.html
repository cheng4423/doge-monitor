<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE 量化交易终端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-yellow: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            font-size: 14px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .price-info { text-align: right; }
        .price-main { 
            font-size: 24px; 
            font-weight: bold; 
            color: var(--accent-green);
        }
        .price-change { 
            font-size: 13px; 
            font-weight: bold;
        }

        .main-area {
            display: flex;
            flex: 1;
            gap: 15px;
            overflow: hidden;
        }

        .chart-container {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            padding: 10px;
        }

        .control-panel {
            width: 300px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .panel-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .balance-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }
        .balance-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .ai-confidence { margin-bottom: 20px; }
        .confidence-label {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }
        .confidence-bar-bg {
            width: 100%;
            height: 6px;
            background: #374151;
            border-radius: 3px;
            overflow: hidden;
        }
        .confidence-bar-fill {
            height: 100%;
            border-radius: 3px;
            width: 70%;
            transition: width 0.5s ease, background 0.5s ease;
        }

        .trade-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            font-size: 14px;
        }
        .btn:hover { opacity: 0.9; }
        .btn:active { transform: scale(0.98); }
        .btn-buy { 
            background: var(--accent-green); 
            color: black;
        }
        .btn-sell { 
            background: var(--accent-red); 
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .auto-trade-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        .btn-auto {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
        }
        .btn-start { background: var(--accent-blue); color: white; }
        .btn-stop { background: var(--accent-yellow); color: black; }

        .stat-item {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .stat-item:last-child { border-bottom: none; }
        
        .status-bar {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.9);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }
        
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(156, 163, 175, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo-section">
            <span>🐕</span>
            <span>DOGE 量化交易</span>
        </div>
        <div class="price-info">
            <div class="price-main" id="currentPrice">--</div>
            <div class="price-change" id="priceChange">--</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 13px; color: var(--text-secondary);">AI信心: <span id="aiConfidenceHeader">--</span></div>
            <div style="font-size: 12px; margin-top: 2px;" id="tradeSignal">● 连接中...</div>
        </div>
    </header>

    <div class="main-area">
        <div class="chart-container">
            <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 14px; color: var(--text-secondary);">
                <span>📈 DOGE/USDT 实时走势</span>
                <div id="chartUpdateTime" style="font-size: 12px;"></div>
            </div>
            <div id="priceChart" style="width: 100%; height: calc(100% - 30px);"></div>
        </div>

        <div class="control-panel">
            <div class="panel-card">
                <div class="panel-title">⚡ 交易控制</div>
                
                <div class="balance-info">
                    <div class="balance-item">
                        <span>USDT余额:</span>
                        <span id="usdtBalanceDisplay" style="color: var(--accent-green); font-weight: bold;">--</span>
                    </div>
                    <div class="balance-item">
                        <span>DOGE余额:</span>
                        <span id="dogeBalanceDisplay" style="color: var(--accent-yellow);">--</span>
                    </div>
                </div>
                
                <div class="ai-confidence">
                    <div class="confidence-label">
                        <span>🤖 AI 信心指数</span>
                        <span id="aiConfidenceValue">--</span>
                    </div>
                    <div class="confidence-bar-bg">
                        <div class="confidence-bar-fill" id="confidenceBar"></div>
                    </div>
                </div>

                <div style="margin-bottom: 10px; font-size: 13px; color: var(--text-secondary);">手动交易</div>
                <div class="trade-buttons">
                    <button class="btn btn-buy" id="buyBtn" onclick="manualTrade('buy')">买入 (Buy)</button>
                    <button class="btn btn-sell" id="sellBtn" onclick="manualTrade('sell')">卖出 (Sell)</button>
                </div>
                
                <div id="tradeHint" style="font-size: 11px; color: var(--text-secondary); margin-top: 5px; min-height: 16px;"></div>

                <div style="margin-bottom: 10px; font-size: 13px; color: var(--text-secondary); margin-top: 20px;">自动交易</div>
                <div class="auto-trade-btns">
                    <button class="btn-auto btn-start" onclick="startAutoTrade()">🚀 启动量化交易</button>
                    <button class="btn-auto btn-stop" onclick="stopAutoTrade()">■ 停止自动交易</button>
                </div>
            </div>

            <div class="panel-card">
                <div style="font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; display: flex; align-items: center; gap: 5px;">📊 统计</div>
                <div class="stat-item"><span>持仓状态</span><span id="holdingStatus">--</span></div>
                <div class="stat-item"><span>持仓均价</span><span id="avgPrice">--</span></div>
                <div class="stat-item"><span>浮动盈亏</span><span id="floatingPnl">--</span></div>
                <div class="stat-item"><span>更新时间</span><span id="updateTime">--</span></div>
            </div>
        </div>
    </div>
</div>

<div class="status-bar" id="statusBar">
    <span class="loading"></span> 连接中...
</div>

<script>
    // ================= 全局变量 =================
    let myChart = null;
    let chartData = [];
    let isTrading = false;
    let lastUpdateTime = 0;
    let quantTimer = null;
    let isQuantRunning = false;
    
    // ================= 初始化图表 =================
    function initChart() {
        const chartDom = document.getElementById('priceChart');
        if (!chartDom) return;
        
        myChart = echarts.init(chartDom);
        
        const option = {
            backgroundColor: 'transparent',
            tooltip: { 
                trigger: 'axis', 
                backgroundColor: 'rgba(17, 24, 39, 0.9)', 
                borderColor: '#374151',
                textStyle: { color: '#e5e7eb' },
                formatter: function (params) {
                    const date = new Date(params[0].value[0]);
                    return `${date.toLocaleTimeString()}<br/>价格: ${params[0].value[1].toFixed(5)} USDT`;
                }
            },
            grid: { left: '3%', right: '4%', bottom: '3%', top: '3%' },
            xAxis: { 
                type: 'time', 
                splitLine: { show: false }, 
                axisLine: { lineStyle: { color: '#374151' } },
                axisLabel: { color: '#6b7280', fontSize: 10 }
            },
            yAxis: { 
                type: 'value', 
                scale: true, 
                splitLine: { 
                    show: true, 
                    lineStyle: { 
                        color: '#374151', 
                        type: 'dashed',
                        opacity: 0.3
                    } 
                },
                axisLine: { lineStyle: { color: '#374151' } },
                axisLabel: { 
                    color: '#6b7280', 
                    formatter: '{value}',
                    fontSize: 10
                }
            },
            series: [{
                name: 'DOGE/USDT',
                type: 'line',
                data: chartData,
                smooth: true,
                symbol: 'circle',
                symbolSize: 2,
                lineStyle: { 
                    color: '#3b82f6', 
                    width: 2,
                    shadowColor: 'rgba(59, 130, 246, 0.3)',
                    shadowBlur: 4
                },
                itemStyle: { color: '#3b82f6' },
                areaStyle: { 
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(59, 130, 246, 0.3)' },
                        { offset: 1, color: 'rgba(59, 130, 246, 0)' }
                    ])
                }
            }]
        };
        myChart.setOption(option);
    }
    
    // ================= 更新图表 =================
    function updateChart(price) {
        const now = Date.now();
        chartData.push([now, price]);
        
        if (chartData.length > 100) {
            chartData.shift();
        }
        
        if (myChart) {
            myChart.setOption({ series: [{ data: chartData }] });
        }
        
        const timeStr = new Date().toLocaleTimeString();
        document.getElementById('chartUpdateTime').textContent = timeStr;
        document.getElementById('updateTime').textContent = timeStr.split(':').slice(0, 2).join(':');
    }
    
    // ================= 更新AI信心 =================
    function updateAIConfidence(confidence) {
        const valueEl = document.getElementById('aiConfidenceValue');
        const headerEl = document.getElementById('aiConfidenceHeader');
        const barEl = document.getElementById('confidenceBar');
        const signalEl = document.getElementById('tradeSignal');
        
        if (valueEl) valueEl.textContent = confidence + '%';
        if (headerEl) headerEl.textContent = confidence + '%';
        if (barEl) {
            barEl.style.width = confidence + '%';
            
            if (confidence >= 80) {
                barEl.style.background = 'linear-gradient(90deg, #10b981, #34d399)';
                if (signalEl) { signalEl.textContent = '● 强烈买入'; signalEl.style.color = '#10b981'; }
            } else if (confidence >= 60) {
                barEl.style.background = 'linear-gradient(90deg, #f59e0b, #fbbf24)';
                if (signalEl) { signalEl.textContent = '● 观望'; signalEl.style.color = '#f59e0b'; }
            } else {
                barEl.style.background = 'linear-gradient(90deg, #ef4444, #f87171)';
                if (signalEl) { signalEl.textContent = '● 风险'; signalEl.style.color = '#ef4444'; }
            }
        }
    }
    
    // ================= 更新按钮状态 =================
    function updateButtonState(data) {
        const buyBtn = document.getElementById('buyBtn');
        const sellBtn = document.getElementById('sellBtn');
        const hintEl = document.getElementById('tradeHint');
        
        if (!buyBtn || !sellBtn || !hintEl) return;
        
        if (data.holding) {
            buyBtn.disabled = true;
            buyBtn.innerHTML = '持有中';
        } else if (!data.canBuy || data.usdtBalance <= 0) {
            buyBtn.disabled = true;
            buyBtn.innerHTML = '余额不足';
        } else {
            buyBtn.disabled = false;
            buyBtn.innerHTML = '买入 (Buy)';
        }
        
        sellBtn.disabled = !data.holding;
        if (!data.holding) {
            sellBtn.innerHTML = '无持仓';
        } else {
            sellBtn.innerHTML = '卖出 (Sell)';
        }
        
        if (!data.canBuy) {
            hintEl.textContent = 'USDT余额不足';
            hintEl.style.color = '#ef4444';
        } else if (data.holding) {
            hintEl.textContent = '可卖出';
            hintEl.style.color = '#f59e0b';
        } else {
            hintEl.textContent = '可买入';
            hintEl.style.color = '#10b981';
        }
    }
    
    // ================= 获取数据 =================
    async function fetchData() {
        try {
            const statusBar = document.getElementById('statusBar');
            if (statusBar) statusBar.innerHTML = '<span class="loading"></span> 更新中...';
            
            const res = await fetch('/api/doge');
            const data = await res.json();
            
            if (!data.success) {
                throw new Error(data.error || '数据错误');
            }
            
            const priceEl = document.getElementById('currentPrice');
            const changeEl = document.getElementById('priceChange');
            if (priceEl) priceEl.textContent = data.price.toFixed(5);
            if (changeEl) {
                const sign = data.pnlPercent >= 0 ? '+' : '';
                changeEl.textContent = sign + data.pnlPercent.toFixed(2) + '%';
                changeEl.style.color = data.pnlPercent >= 0 ? '#10b981' : '#ef4444';
            }
            
            const usdtBalanceEl = document.getElementById('usdtBalanceDisplay');
            const dogeBalanceEl = document.getElementById('dogeBalanceDisplay');
            if (usdtBalanceEl) usdtBalanceEl.textContent = data.usdtBalance.toFixed(2) + ' USDT';
            if (dogeBalanceEl) dogeBalanceEl.textContent = data.dogeBalance.toFixed(2) + ' DOGE';
            
            updateAIConfidence(data.aiConfidence);
            
            const holdingEl = document.getElementById('holdingStatus');
            const pnlEl = document.getElementById('floatingPnl');
            if (holdingEl) {
                holdingEl.textContent = data.holding ? '持有' : '空仓';
                holdingEl.style.color = data.holding ? '#10b981' : '#9ca3af';
            }
            if (pnlEl) {
                pnlEl.textContent = (data.pnl >= 0 ? '+' : '') + data.pnl.toFixed(2) + ' USDT';
                pnlEl.style.color = data.pnl >= 0 ? '#10b981' : '#ef4444';
            }
            
            updateButtonState(data);
            updateChart(data.price);
            
            lastUpdateTime = Date.now();
            if (statusBar) {
                const timeStr = new Date().toLocaleTimeString();
                statusBar.innerHTML = `✅ 运行中 | ${data.usdtBalance.toFixed(2)} USDT | ${timeStr}`;
            }
            
        } catch (err) {
            console.error(err);
            const statusBar = document.getElementById('statusBar');
            if (statusBar) statusBar.innerHTML = '❌ 连接失败';
        }
    }
    
    // ================= 手动交易 =================
    async function manualTrade(type) {
        if (isTrading) return;
        isTrading = true;
        const buyBtn = document.getElementById('buyBtn');
        const sellBtn = document.getElementById('sellBtn');
        const statusBar = document.getElementById('statusBar');
        if (buyBtn) buyBtn.disabled = true;
        if (sellBtn) sellBtn.disabled = true;
        if (statusBar) statusBar.innerHTML = '<span class="loading"></span> 交易中...';
        
        try {
            const res = await fetch(`/api/doge?action=${type}`);
            const data = await res.json();
            if (data.success) {
                alert(`✅ 交易成功!`);
                fetchData();
            } else {
                alert(`❌ 失败: ${data.error}`);
            }
        } catch (err) {
            alert('❌ 网络错误');
        } finally {
            isTrading = false;
            if (buyBtn) buyBtn.disabled = false;
            if (sellBtn) sellBtn.disabled = false;
        }
    }
    
    // ================= 自动交易 =================
    async function startAutoTrade() {
        try {
            const res = await fetch('/api/doge?action=quant');
            const data = await res.json();
            
            if (data.success) {
                alert('🚀 量化交易已启动！');
                isQuantRunning = true;
                // 改变按钮样式
                const btn = document.querySelector('.btn-start');
                if(btn) {
                    btn.innerHTML = '✅ 运行中';
                    btn.style.background = '#10b981';
                }
            } else {
                alert('启动失败');
            }
        } catch (err) {
            alert('请求错误');
        }
    }

    function stopAutoTrade() {
        isQuantRunning = false;
        alert('⏹ 量化已停止');
        const btn = document.querySelector('.btn-start');
        if(btn) {
            btn.innerHTML = '🚀 启动量化交易';
            btn.style.background = '';
        }
    }
    
    // ================= 初始化 =================
    document.addEventListener('DOMContentLoaded', () => {
        initChart();
        fetchData();
        setInterval(fetchData, 3000);
        
        window.addEventListener('resize', () => {
            if (myChart) myChart.resize();
        });
    });
</script>
</body>
</html>
