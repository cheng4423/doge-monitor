<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>欧意 DOGE AI 量子交易</title>

<style>
:root {
    --bg: #070b1a;
    --card: #0f172a;
    --green: #10b981;
    --red: #ef4444;
    --blue: #3b82f6;
    --purple: #8b5cf6;
    --yellow: #f59e0b;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
    background: var(--bg);
    color: #e5e7eb;
    font-family: 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
}

.container {
    display: flex;
    width: 100%;
    padding: 15px;
    gap: 15px;
}

.left {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.right {
    width: 400px;
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.card {
    background: var(--card);
    border-radius: 14px;
    padding: 20px;
    border: 1px solid #1e293b;
}

h2 {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.big {
    font-size: 32px;
    font-weight: bold;
}

.med {
    font-size: 20px;
    font-weight: bold;
}

.green { color: var(--green); }
.red { color: var(--red); }
.purple { color: var(--purple); }
.yellow { color: var(--yellow); }

button {
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
}

.btn-green { background: var(--green); color: black; }
.btn-red { background: var(--red); color: white; }
.btn-purple { background: var(--purple); color: white; }
.btn-blue { background: var(--blue); color: white; }

.btn-green:hover { background: #0da271; }
.btn-red:hover { background: #dc2626; }
.btn-purple:hover { background: #7c3aed; }
.btn-blue:hover { background: #2563eb; }

.log {
    background: #020617;
    border-radius: 10px;
    padding: 10px;
    height: 220px;
    overflow: auto;
    font-size: 12px;
    font-family: 'Courier New', monospace;
}

.log-line {
    margin-bottom: 3px;
    padding: 2px 0;
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

.score-bar {
    height: 6px;
    background: #1e293b;
    border-radius: 3px;
    margin-top: 8px;
    overflow: hidden;
}

.score-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--red), var(--green));
    transition: 0.5s;
}

.balance-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 10px;
}

.balance-item {
    background: rgba(30, 41, 59, 0.5);
    padding: 10px;
    border-radius: 8px;
    text-align: center;
}

.balance-label {
    font-size: 12px;
    color: #94a3b8;
    margin-bottom: 5px;
}

.balance-value {
    font-size: 16px;
    font-weight: bold;
}

.stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 10px;
}

.stat-item {
    background: rgba(30, 41, 59, 0.3);
    padding: 8px;
    border-radius: 6px;
    text-align: center;
}

.stat-label {
    font-size: 11px;
    color: #94a3b8;
    margin-bottom: 3px;
}

.stat-value {
    font-size: 13px;
    font-weight: bold;
}

.loading {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(156, 163, 175, 0.3);
    border-radius: 50%;
    border-top-color: var(--blue);
    animation: spin 1s linear infinite;
    margin-right: 5px;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="container">

<!-- 左侧 -->
<div class="left">
    <!-- 价格和AI评分 -->
    <div class="card">
        <h2>📈 DOGE/USDT 实时行情</h2>
        <div class="big" id="price">--</div>
        <div id="change" style="font-size: 13px; margin-top: 3px;">--</div>
        
        <div style="margin-top: 15px;">
            <h2>🧠 AI 量子评分</h2>
            <div class="med purple" id="score">--</div>
            <div id="suggest" style="margin-top: 3px; font-weight: bold;"></div>
            <div class="score-bar">
                <div class="score-fill" id="scoreBar"></div>
            </div>
        </div>
    </div>

    <!-- 盈亏统计 -->
    <div class="card">
        <h2>💰 盈利统计</h2>
        <div class="big green" id="profit">0.00 USDT</div>
        
        <div class="stat-grid">
            <div class="stat-item">
                <div class="stat-label">持仓盈亏</div>
                <div class="stat-value green" id="floatingPnl">+0.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">盈亏比例</div>
                <div class="stat-value green" id="pnlPercent">0.00%</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">今日盈利</div>
                <div class="stat-value green" id="todayProfit">0.00</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">累计盈利</div>
                <div class="stat-value green" id="totalProfit">0.00</div>
            </div>
        </div>
    </div>
</div>

<!-- 右侧 -->
<div class="right">
    <!-- 账户余额 -->
    <div class="card">
        <h2>💳 欧意账户余额</h2>
        <div class="balance-grid">
            <div class="balance-item">
                <div class="balance-label">USDT 余额</div>
                <div class="balance-value green" id="usdtBalance">--</div>
            </div>
            <div class="balance-item">
                <div class="balance-label">DOGE 余额</div>
                <div class="balance-value yellow" id="dogeBalance">--</div>
            </div>
        </div>
        
        <div style="margin-top: 10px;">
            <div style="font-size: 12px; color: #94a3b8;">持仓状态</div>
            <div id="holdingStatus" style="font-size: 13px; font-weight: bold; color: #94a3b8;">--</div>
        </div>
    </div>

    <!-- AI控制 -->
    <div class="card">
        <h2>🤖 AI 自动交易</h2>
        <button class="btn-purple" style="width:100%" onclick="startAI()" id="startBtn">
            <span id="startText">🚀 启动 AI 量化交易</span>
        </button>
        <button class="btn-red" style="width:100%;margin-top:10px" onclick="stopAI()" id="stopBtn" disabled>
            <span id="stopText">⏹ 停止交易</span>
        </button>
        
        <div style="margin-top: 10px; font-size: 12px;">
            <div id="aiStatus">状态: 未运行</div>
            <div id="aiRuntime" style="color: #94a3b8; font-size: 11px;">运行: 0秒</div>
        </div>
    </div>

    <!-- 交易日记 -->
    <div class="card">
        <h2>📓 交易日记</h2>
        <div class="log" id="log">
            <div class="log-line" id="logTemplate">[--:--:--] 系统初始化...</div>
        </div>
    </div>
</div>

</div>

<script>
// ================= 全局变量 =================
let price = 0.15;
let holding = false;
let buyPrice = 0;
let buyAmount = 0;
let profit = 0;
let todayProfit = 0;
let totalProfit = 0;
let win = 0, lose = 0;
let aiOn = false;
let aiTimer = null;
let aiStartTime = 0;
let refreshTimer = null;

// 欧意账户数据
let accountData = {
    usdtBalance: 0,
    dogeBalance: 0,
    holding: false,
    avgPrice: 0
};

// 盈利统计
let stats = {
    floatingPnl: 0,
    pnlPercent: 0,
    tradesToday: 0
};

// ================= 从欧意API获取数据 =================
async function fetchOKXData() {
    try {
        // 这里调用你的后端API
        const response = await fetch('/api/doge');
        if (!response.ok) {
            throw new Error('获取数据失败');
        }
        return await response.json();
    } catch (error) {
        console.log('使用模拟数据');
        return getMockData();
    }
}

function getMockData() {
    // 模拟欧意数据
    const mockPrice = 0.15 + (Math.random() - 0.5) * 0.01;
    return {
        success: true,
        price: mockPrice,
        usdtBalance: 100.00 + (Math.random() * 20),
        dogeBalance: holding ? buyAmount : 0,
        holding: holding,
        avgPrice: holding ? buyPrice : 0,
        pnl: stats.floatingPnl,
        pnlPercent: stats.pnlPercent
    };
}

// ================= 更新价格和余额 =================
async function updatePrices() {
    const data = await fetchOKXData();
    if (data && data.success) {
        price = data.price;
        
        // 更新价格显示
        document.getElementById('price').textContent = price.toFixed(5) + ' USDT';
        
        // 更新余额
        accountData.usdtBalance = data.usdtBalance || 0;
        accountData.dogeBalance = data.dogeBalance || 0;
        accountData.holding = data.holding || false;
        
        if (data.avgPrice) {
            accountData.avgPrice = data.avgPrice;
        }
        
        document.getElementById('usdtBalance').textContent = accountData.usdtBalance.toFixed(2) + ' USDT';
        document.getElementById('dogeBalance').textContent = accountData.dogeBalance.toFixed(2) + ' DOGE';
        
        // 更新持仓状态
        updateHoldingStatus();
        
        // 更新盈亏
        updateProfit();
        
        // 记录日志
        addLog('数据已更新', 'info');
    }
}

// ================= 更新持仓状态 =================
function updateHoldingStatus() {
    const statusEl = document.getElementById('holdingStatus');
    if (accountData.holding) {
        statusEl.textContent = '持仓中 (' + accountData.dogeBalance.toFixed(2) + ' DOGE)';
        statusEl.style.color = 'var(--green)';
    } else {
        statusEl.textContent = '空仓';
        statusEl.style.color = 'var(--yellow)';
    }
}

// ================= 更新盈亏 =================
function updateProfit() {
    if (accountData.holding && accountData.avgPrice > 0) {
        stats.floatingPnl = (price - accountData.avgPrice) * accountData.dogeBalance;
        stats.pnlPercent = ((price - accountData.avgPrice) / accountData.avgPrice * 100);
        
        const pnlClass = stats.floatingPnl >= 0 ? 'green' : 'red';
        document.getElementById('floatingPnl').textContent = (stats.floatingPnl >= 0 ? '+' : '') + stats.floatingPnl.toFixed(2) + ' USDT';
        document.getElementById('floatingPnl').className = 'stat-value ' + pnlClass;
        document.getElementById('pnlPercent').textContent = (stats.pnlPercent >= 0 ? '+' : '') + stats.pnlPercent.toFixed(2) + '%';
        document.getElementById('pnlPercent').className = 'stat-value ' + pnlClass;
    } else {
        document.getElementById('floatingPnl').textContent = '+0.00 USDT';
        document.getElementById('floatingPnl').className = 'stat-value green';
        document.getElementById('pnlPercent').textContent = '0.00%';
        document.getElementById('pnlPercent').className = 'stat-value green';
    }
    
    document.getElementById('todayProfit').textContent = todayProfit.toFixed(2) + ' USDT';
    document.getElementById('totalProfit').textContent = totalProfit.toFixed(2) + ' USDT';
    document.getElementById('profit').textContent = totalProfit.toFixed(2) + ' USDT';
}

// ================= AI量子评分 =================
function aiScore() {
    let s = Math.floor(Math.random() * 40) + 60; // 60-100
    document.getElementById('score').textContent = s;
    document.getElementById('scoreBar').style.width = s + '%';
    
    const suggestEl = document.getElementById('suggest');
    if (s <= 10) {
        suggestEl.textContent = '❌ 不建议买入';
        suggestEl.className = 'red';
    } else if (s >= 90) {
        suggestEl.textContent = '🚀 强力买入信号';
        suggestEl.className = 'purple';
    } else if (s >= 60) {
        suggestEl.textContent = '✅ 建议买入';
        suggestEl.className = 'green';
    } else {
        suggestEl.textContent = '⏸ 观望';
        suggestEl.className = '';
    }
    return s;
}

// ================= 模拟交易 =================
async function simulateTrade(side) {
    if (side === 'buy') {
        if (accountData.holding) {
            addLog('已有持仓，无法买入', 'info');
            return;
        }
        
        if (accountData.usdtBalance < 10) {
            addLog('USDT余额不足', 'error');
            return;
        }
        
        // 模拟买入
        buyAmount = Math.floor(accountData.usdtBalance / price * 0.2); // 用20%资金
        buyPrice = price;
        holding = true;
        
        addLog(`🟢 买入 ${buyAmount} DOGE @ ${price.toFixed(5)}`, 'success');
        
    } else if (side === 'sell') {
        if (!accountData.holding) {
            addLog('无持仓可卖', 'info');
            return;
        }
        
        // 计算盈亏
        const profit = (price - buyPrice) * buyAmount - 0.05; // 扣除手续费
        
        if (profit >= 0.5) {
            win++;
            addLog(`🔥 盈利卖出: ${profit.toFixed(2)} USDT`, 'success');
        } else {
            lose++;
            addLog(`💥 亏损卖出: ${profit.toFixed(2)} USDT`, 'error');
        }
        
        todayProfit += profit;
        totalProfit += profit;
        holding = false;
        buyAmount = 0;
    }
    
    // 更新界面
    updatePrices();
}

// ================= AI量化策略 =================
async function runAIStrategy() {
    if (!aiOn) return;
    
    const score = aiScore();
    
    if (score >= 60 && !accountData.holding) {
        // 高评分且空仓，买入
        await simulateTrade('buy');
    } else if (score <= 40 && accountData.holding) {
        // 低评分且持仓，卖出
        await simulateTrade('sell');
    } else if (accountData.holding) {
        // 检查盈利是否达到0.5元
        const profit = (price - buyPrice) * buyAmount - 0.05;
        if (profit >= 0.5) {
            addLog(`🎯 达到盈利目标: ${profit.toFixed(2)} USDT`, 'success');
            await simulateTrade('sell');
        }
    }
}

// ================= 更新AI运行时间 =================
function updateAITime() {
    if (!aiOn) return;
    
    const runtime = Math.floor((Date.now() - aiStartTime) / 1000);
    const hours = Math.floor(runtime / 3600);
    const minutes = Math.floor((runtime % 3600) / 60);
    const seconds = runtime % 60;
    
    document.getElementById('aiRuntime').textContent = 
        `运行: ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    setTimeout(updateAITime, 1000);
}

// ================= AI控制 =================
function startAI() {
    if (aiOn) {
        addLog('AI已在运行中', 'info');
        return;
    }
    
    aiOn = true;
    aiStartTime = Date.now();
    
    // 更新按钮状态
    document.getElementById('startBtn').disabled = true;
    document.getElementById('stopBtn').disabled = false;
    document.getElementById('startText').innerHTML = '<span class="loading"></span>运行中';
    document.getElementById('aiStatus').textContent = '状态: 运行中';
    document.getElementById('aiStatus').style.color = 'var(--green)';
    
    addLog('🚀 AI量化交易已启动', 'success');
    addLog('策略: 高评分买入, 低评分卖出, 盈利≥0.5元自动止盈', 'info');
    
    // 启动AI循环
    aiTimer = setInterval(runAIStrategy, 10000); // 每10秒执行一次
    
    // 开始计时
    updateAITime();
    
    alert('✅ AI量化交易已启动！\n系统将自动监控价格并执行交易');
}

function stopAI() {
    if (!aiOn) {
        addLog('AI未运行', 'info');
        return;
    }
    
    aiOn = false;
    clearInterval(aiTimer);
    
    // 更新按钮状态
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('startText').textContent = '🚀 启动 AI 量化交易';
    document.getElementById('aiStatus').textContent = '状态: 已停止';
    document.getElementById('aiStatus').style.color = 'var(--red)';
    
    const runtime = Math.floor((Date.now() - aiStartTime) / 1000);
    addLog(`⏹️ AI量化已停止, 运行时长: ${runtime}秒`, 'info');
    
    alert('⏹️ AI量化交易已停止');
}

// ================= 日志系统 =================
function addLog(message, type = 'info') {
    const logContainer = document.getElementById('log');
    const now = new Date();
    const time = now.toLocaleTimeString();
    
    const logLine = document.createElement('div');
    logLine.className = 'log-line';
    
    let color = '#94a3b8'; // 默认灰色
    if (type === 'success') color = 'var(--green)';
    if (type === 'error') color = 'var(--red)';
    if (type === 'info') color = 'var(--blue)';
    
    logLine.innerHTML = `<span style="color:#64748b">[${time}]</span> <span style="color:${color}">${message}</span>`;
    logContainer.appendChild(logLine);
    
    // 自动滚动到底部
    logContainer.scrollTop = logContainer.scrollHeight;
    
    // 保持最多30条日志
    if (logContainer.children.length > 30) {
        logContainer.removeChild(logContainer.firstChild);
    }
}

// ================= 页面初始化 =================
document.addEventListener('DOMContentLoaded', () => {
    // 首次加载数据
    updatePrices();
    
    // 启动定时刷新
    refreshTimer = setInterval(updatePrices, 3000);
    
    // 初始AI评分
    aiScore();
    
    addLog('系统初始化完成', 'info');
    addLog('正在连接欧意账户...', 'info');
    
    // 窗口调整
    window.addEventListener('resize', () => {
        // 可以在这里添加图表调整
    });
});

// 全局导出
window.startAI = startAI;
window.stopAI = stopAI;
</script>
</body>
</html>
