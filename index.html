<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE 量化交易终端</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        :root {
            --bg-dark: #0a0e1a;
            --bg-card: #111827;
            --border-color: #1f2937;
            --text-primary: #e5e7eb;
            --text-secondary: #9ca3af;
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-blue: #3b82f6;
            --accent-yellow: #f59e0b;
            --accent-purple: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
            padding: 15px;
            gap: 15px;
        }

        /* 左侧图表区 */
        .chart-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 16px;
        }

        .price-info { text-align: right; }
        .price-main { 
            font-size: 28px; 
            font-weight: bold; 
            color: var(--accent-green);
        }
        .price-change { 
            font-size: 13px; 
            font-weight: bold;
        }

        .chart-container {
            flex: 1;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            position: relative;
            padding: 10px;
        }

        /* 右侧控制面板 */
        .control-panel {
            width: 380px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }

        .panel-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
        }

        .panel-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
        }

        /* 余额 */
        .balance-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 15px;
        }

        .balance-item {
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .balance-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .balance-value {
            font-size: 16px;
            font-weight: bold;
        }

        /* 交易面板 */
        .trade-input {
            width: 100%;
            background: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: white;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .trade-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }

        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .btn-buy { background: var(--accent-green); color: black; }
        .btn-sell { background: var(--accent-red); color: white; }
        .btn-start { background: var(--accent-purple); color: white; }
        .btn-stop { background: var(--accent-yellow); color: black; }

        /* 统计 */
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .stat-item {
            background: var(--bg-dark);
            padding: 12px;
            border-radius: 8px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: bold;
        }

        .profit { color: var(--accent-green); }
        .loss { color: var(--accent-red); }

        /* 日志 */
        .log-container {
            background: var(--bg-dark);
            border-radius: 8px;
            padding: 12px;
            height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .log-entry {
            margin-bottom: 4px;
            padding: 2px 0;
        }

        .log-time { color: var(--text-secondary); }
        .log-success { color: var(--accent-green); }
        .log-error { color: var(--accent-red); }
        .log-info { color: var(--accent-blue); }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(156, 163, 175, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-blue);
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧图表区 -->
        <div class="chart-area">
            <div class="header">
                <div class="logo-section">
                    <span>🤖</span>
                    <span>DOGE AI量化交易</span>
                </div>
                <div class="price-info">
                    <div class="price-main" id="currentPrice">--</div>
                    <div class="price-change" id="priceChange">--</div>
                </div>
            </div>
            <div class="chart-container">
                <div id="priceChart" style="width: 100%; height: 100%;"></div>
            </div>
        </div>

        <!-- 右侧控制面板 -->
        <div class="control-panel">
            <!-- 账户余额 -->
            <div class="panel-card">
                <div class="panel-title">💰 账户余额</div>
                <div class="balance-grid">
                    <div class="balance-item">
                        <div class="balance-label">USDT余额</div>
                        <div class="balance-value" id="usdtBalance" style="color: var(--accent-green);">--</div>
                    </div>
                    <div class="balance-item">
                        <div class="balance-label">DOGE余额</div>
                        <div class="balance-value" id="dogeBalance" style="color: var(--accent-yellow);">--</div>
                    </div>
                </div>
            </div>

            <!-- 手动交易 -->
            <div class="panel-card">
                <div class="panel-title">⚡ 手动交易</div>
                <input type="number" id="tradeAmount" class="trade-input" placeholder="交易数量 (最小10)" value="10" min="10">
                <div class="trade-buttons">
                    <button class="btn btn-buy" id="buyBtn" onclick="executeManualTrade('buy')">买入 DOGE</button>
                    <button class="btn btn-sell" id="sellBtn" onclick="executeManualTrade('sell')">卖出 DOGE</button>
                </div>
                <div id="tradeStatus" style="font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 10px; min-height: 16px;">
                    准备就绪
                </div>
            </div>

            <!-- 盈亏统计 -->
            <div class="panel-card">
                <div class="panel-title">📊 盈亏统计</div>
                <div class="stat-grid">
                    <div class="stat-item">
                        <div class="stat-label">持仓状态</div>
                        <div class="stat-value" id="holdingStatus">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">持仓均价</div>
                        <div class="stat-value" id="avgPrice">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">浮动盈亏</div>
                        <div class="stat-value" id="floatingPnl">--</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">盈亏比例</div>
                        <div class="stat-value" id="pnlPercent">--</div>
                    </div>
                </div>
            </div>

            <!-- AI量化控制 -->
            <div class="panel-card">
                <div class="panel-title">🤖 AI量化控制</div>
                <div class="trade-buttons">
                    <button class="btn btn-start" id="aiStartBtn" onclick="toggleAI()">启动量化</button>
                    <button class="btn btn-stop" id="aiStopBtn" onclick="toggleAI()" disabled>停止量化</button>
                </div>
                <div id="aiStatus" style="font-size: 12px; color: var(--text-secondary); text-align: center; margin-top: 10px;">
                    状态: 未运行
                </div>
            </div>

            <!-- 交易日志 -->
            <div class="panel-card">
                <div class="panel-title">📋 交易日志</div>
                <div class="log-container" id="logContainer">
                    <div class="log-entry">
                        <span class="log-time">[System]</span>
                        <span class="log-info"> 终端初始化...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ================= 全局变量 =================
        let chart = null;
        let chartData = [];
        let isTrading = false;
        let aiTimer = null;
        let isAIRunning = false;

        // ================= 初始化图表 =================
        function initChart() {
            chart = echarts.init(document.getElementById('priceChart'));
            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    formatter: params => `${new Date(params[0].value[0]).toLocaleTimeString()}<br/>$${params[0].value[1].toFixed(5)}`
                },
                grid: { left: '3%', right: '4%', bottom: '3%', top: '3%', containLabel: true },
                xAxis: { type: 'time', splitLine: { show: false }, axisLine: { lineStyle: { color: '#374151' } } },
                yAxis: { type: 'value', scale: true, splitLine: { lineStyle: { color: '#374151', type: 'dashed' } } },
                series: [{
                    name: 'DOGE/USDT',
                    type: 'line',
                    smooth: true,
                    symbol: 'none',
                    data: chartData,
                    lineStyle: { color: '#3b82f6', width: 2 },
                    areaStyle: { color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [{offset: 0, color: 'rgba(59, 130, 246, 0.3)'}, {offset: 1, color: 'rgba(59, 130, 246, 0)'}]) }
                }]
            };
            chart.setOption(option);
        }

        // ================= 获取后端数据 =================
        async function fetchBackendData() {
            try {
                const res = await fetch('/api/doge');
                if (!res.ok) throw new Error('Network response was not ok');
                return await res.json();
            } catch (error) {
                console.error('Fetch backend failed:', error);
                addLog('连接后端失败', 'error');
                return null;
            }
        }

        // ================= 更新UI =================
        function updateUI(data) {
            if (!data || !data.success) {
                document.getElementById('tradeStatus').textContent = '获取后端数据失败';
                document.getElementById('tradeStatus').style.color = 'var(--accent-red)';
                return;
            }

            // 价格
            document.getElementById('currentPrice').textContent = data.price.toFixed(5);
            const changeEl = document.getElementById('priceChange');
            const changePercent = data.pnlPercent || 0;
            changeEl.textContent = (changePercent >= 0 ? '+' : '') + changePercent.toFixed(2) + '%';
            changeEl.style.color = changePercent >= 0 ? 'var(--accent-green)' : 'var(--accent-red)';

            // 余额
            document.getElementById('usdtBalance').textContent = data.usdtBalance.toFixed(2);
            document.getElementById('dogeBalance').textContent = data.dogeBalance.toFixed(2);

            // 持仓与盈亏
            document.getElementById('holdingStatus').textContent = data.holding ? '持仓中' : '空仓';
            document.getElementById('holdingStatus').style.color = data.holding ? 'var(--accent-green)' : 'var(--text-secondary)';
            document.getElementById('avgPrice').textContent = data.holding ? data.avgPrice.toFixed(5) : '--';
            
            const pnlEl = document.getElementById('floatingPnl');
            const pnlPercentEl = document.getElementById('pnlPercent');
            pnlEl.textContent = (data.pnl >= 0 ? '+' : '') + data.pnl.toFixed(2);
            pnlPercentEl.textContent = (data.pnlPercent >= 0 ? '+' : '') + data.pnlPercent.toFixed(2) + '%';
            pnlEl.className = 'stat-value ' + (data.pnl >= 0 ? 'profit' : 'loss');
            pnlPercentEl.className = 'stat-value ' + (data.pnl >= 0 ? 'profit' : 'loss');

            // 图表
            chartData.push([Date.now(), data.price]);
            if (chartData.length > 100) chartData.shift();
            chart.setOption({ series: [{ data: chartData }] });

            // 按钮状态
            document.getElementById('buyBtn').disabled = data.holding || data.usdtBalance < 1;
            document.getElementById('sellBtn').disabled = !data.holding;
        }

        // ================= 手动交易 =================
        async function executeManualTrade(side) {
            if (isTrading) return;
            isTrading = true;
            const amount = document.getElementById('tradeAmount').value;
            const statusEl = document.getElementById('tradeStatus');
            
            statusEl.innerHTML = '<span class="loading"></span> 交易处理中...';
            statusEl.style.color = 'var(--accent-yellow)';

            try {
                const res = await fetch(`/api/doge?action=${side}&amount=${amount}`);
                const result = await res.json();

                if (result.success) {
                    addLog(`✅ ${side === 'buy' ? '买入' : '卖出'}成功: ${result.amount} DOGE`, 'success');
                    statusEl.textContent = '交易成功';
                    statusEl.style.color = 'var(--accent-green)';
                } else {
                    addLog(`❌ 交易失败: ${result.error}`, 'error');
                    statusEl.textContent = result.error;
                    statusEl.style.color = 'var(--accent-red)';
                }
            } catch (err) {
                addLog('交易请求失败', 'error');
                statusEl.textContent = '网络错误';
                statusEl.style.color = 'var(--accent-red)';
            } finally {
                isTrading = false;
                refreshData(); // 刷新UI
            }
        }

        // ================= AI量化 =================
        function toggleAI() {
            if (isAIRunning) {
                // 停止
                isAIRunning = false;
                clearInterval(aiTimer);
                document.getElementById('aiStartBtn').disabled = false;
                document.getElementById('aiStopBtn').disabled = true;
                document.getElementById('aiStatus').textContent = '状态: 已停止';
                document.getElementById('aiStatus').style.color = 'var(--text-secondary)';
                addLog('AI量化已停止', 'info');
            } else {
                // 启动
                isAIRunning = true;
                document.getElementById('aiStartBtn').disabled = true;
                document.getElementById('aiStopBtn').disabled = false;
                document.getElementById('aiStatus').textContent = '状态: 运行中';
                document.getElementById('aiStatus').style.color = 'var(--accent-green)';
                addLog('AI量化已启动', 'success');
                
                aiTimer = setInterval(async () => {
                    const data = await fetchBackendData();
                    if (data && data.success) {
                        // 简单的AI策略：如果赚钱就卖，亏钱就买（仅示例）
                        if (data.holding && data.pnlPercent > 3) {
                            addLog('AI触发止盈', 'info');
                            await executeManualTrade('sell');
                        } else if (!data.holding && data.usdtBalance > 10) {
                            addLog('AI触发买入', 'info');
                            await executeManualTrade('buy');
                        }
                    }
                }, 10000); // 每10秒检查一次
            }
        }

        // ================= 日志 =================
        function addLog(message, type = 'info') {
            const container = document.getElementById('logContainer');
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="log-time">[${time}]</span> <span class="log-${type}">${message}</span>`;
            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;
            if (container.children.length > 20) container.removeChild(container.firstChild);
        }

        // ================= 刷新数据 =================
        async function refreshData() {
            const data = await fetchBackendData();
            updateUI(data);
        }

        // ================= 初始化 =================
        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            refreshData();
            setInterval(refreshData, 3000); // 每3秒刷新一次数据
            window.addEventListener('resize', () => chart.resize());
        });
    </script>
</body>
</html>
