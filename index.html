<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOGE 0.5% 高频微利交易</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 900px; margin: 0 auto; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #333; text-align: center; }
        .status-card { background: #f8f9fa; padding: 20px; border-radius: 12px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        .profit { color: #28a745; font-weight: bold; }
        .loss { color: #dc3545; }
        .control-panel { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
        button { padding: 15px 25px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: all 0.3s; font-weight: bold; }
        #runBtn { background: linear-gradient(to right, #00b09b, #96c93d); color: white; flex-grow: 2; }
        #autoBtn { background: linear-gradient(to right, #8e2de2, #4a00e0); color: white; }
        .stop { background: linear-gradient(to right, #ff416c, #ff4b2b); color: white; }
        button:hover { transform: translateY(-2px); box-shadow: 0 7px 14px rgba(0,0,0,0.1); }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .log-container { background: #1e1e1e; color: #f1f1f1; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; max-height: 300px; overflow-y: auto; }
        .log-entry { margin-bottom: 5px; }
        .log-entry.success { color: #4caf50; }
        .log-entry.error { color: #f44336; }
        .log-entry.info { color: #2196f3; }
        .config-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #e3f2fd; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 DOGE 高频微利交易策略</h1>
        <p style="text-align: center; color: #666;">策略：买入后，价格上涨 <strong>0.5%</strong> 即自动卖出。不限制每日交易次数。</p>

        <div class="status-card">
            <h3>📈 实时状态</h3>
            <div id="statusText">正在连接...</div>
            <div id="priceDisplay">当前价格: --</div>
            <div id="positionDisplay">持仓: 无</div>
            <div id="profitDisplay">目标利润: 0.5% (扣除手续费后)</div>
        </div>

        <div class="config-info">
            <div><strong>交易对:</strong> <span id="configSymbol">DOGE-USDT</span></div>
            <div><strong>单笔金额:</strong> <span id="configAmount">1</span> USDT</div>
            <div><strong>目标利润:</strong> <span id="configProfit">0.5</span>%</div>
            <div><strong>手续费率:</strong> <span id="configFee">0.1</span>% (单边)</div>
        </div>

        <div class="control-panel">
            <button id="runBtn" onclick="runOnce()">▶️ 执行一次交易循环</button>
            <button id="autoBtn" onclick="toggleAuto()">🤖 开启自动交易</button>
            <button class="stop" onclick="stopAll()" id="stopBtn" disabled>⏹️ 停止自动</button>
            <button onclick="resetPosition()" style="background: #6c757d; color: white;">🔄 重置状态</button>
        </div>

        <div>
            <h3>📋 交易日志</h3>
            <div class="log-container" id="logArea">
                <div class="log-entry info">系统就绪。点击按钮开始。</div>
            </div>
        </div>
    </div>

    <script>
        let autoInterval = null;
        let isAutoRunning = false;

        // 工具函数
        function addLog(message, type = 'info') {
            const logArea = document.getElementById('logArea');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logArea.appendChild(entry);
            logArea.scrollTop = logArea.scrollHeight; // 自动滚动到底部
        }

        // 获取状态
        async function updateStatus() {
            try {
                const res = await fetch('/api/doge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'status' })
                });
                const data = await res.json();
                
                document.getElementById('priceDisplay').textContent = `当前价格: ${data.currentPrice.toFixed(6)} USDT`;
                
                if (data.hasPosition && data.position) {
                    const pos = data.position;
                    document.getElementById('positionDisplay').innerHTML = 
                        `<span class="profit">持仓中</span> - 买入价: ${pos.buyPrice.toFixed(6)} | 目标价: ${pos.targetSellPrice.toFixed(6)}`;
                    document.getElementById('profitDisplay').innerHTML = 
                        `浮动盈亏: <span class="${pos.currentProfitPercent >= 0 ? 'profit' : 'loss'}">${pos.currentProfitPercent.toFixed(4)}%</span> | 还需涨幅: ${pos.profitNeededPercent}%`;
                } else {
                    document.getElementById('positionDisplay').innerHTML = '持仓: <span style="color:#6c757d">无</span>';
                    document.getElementById('profitDisplay').textContent = '目标利润: 0.5% (扣除手续费后)';
                }
                document.getElementById('statusText').innerHTML = '<span class="profit">✅ 连接正常</span>';
            } catch (e) {
                document.getElementById('statusText').innerHTML = '<span class="loss">❌ 连接失败</span>';
                addLog(`状态更新失败: ${e.message}`, 'error');
            }
        }

        // 执行一次交易
        async function runOnce() {
            addLog('开始执行交易循环...', 'info');
            document.getElementById('runBtn').disabled = true;
            
            try {
                const res = await fetch('/api/doge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'run' })
                });
                const result = await res.json();
                
                // 显示日志
                if (result.logs) {
                    result.logs.forEach(log => addLog(log, 'info'));
                }
                
                if (result.action === 'BUY') {
                    addLog('✅ 买入操作成功', 'success');
                } else if (result.action === 'SELL') {
                    addLog(`💰 卖出操作成功! 净利润率: ${result.profitPercent?.toFixed(4)}%`, 'success');
                } else if (result.action === 'HOLD') {
                    addLog('⏳ 继续持有', 'info');
                }
                
            } catch (e) {
                addLog(`❌ 执行失败: ${e.message}`, 'error');
            } finally {
                document.getElementById('runBtn').disabled = false;
                updateStatus(); // 更新状态显示
            }
        }

        // 切换自动交易
        function toggleAuto() {
            if (!isAutoRunning) {
                isAutoRunning = true;
                autoInterval = setInterval(runOnce, 10000); // 每10秒执行一次
                document.getElementById('autoBtn').textContent = '⏸️ 暂停自动';
                document.getElementById('autoBtn').style.background = 'linear-gradient(to right, #ff9500, #ff5e3a)';
                document.getElementById('stopBtn').disabled = false;
                addLog('自动交易已开启 (每10秒循环一次)', 'success');
            } else {
                clearInterval(autoInterval);
                isAutoRunning = false;
                document.getElementById('autoBtn').textContent = '🤖 开启自动交易';
                document.getElementById('autoBtn').style.background = 'linear-gradient(to right, #8e2de2, #4a00e0)';
                addLog('自动交易已暂停', 'info');
            }
        }

        // 停止所有
        function stopAll() {
            if (autoInterval) clearInterval(autoInterval);
            isAutoRunning = false;
            document.getElementById('autoBtn').textContent = '🤖 开启自动交易';
            document.getElementById('autoBtn').style.background = 'linear-gradient(to right, #8e2de2, #4a00e0)';
            document.getElementById('stopBtn').disabled = true;
            addLog('自动交易已停止', 'info');
        }

        // 重置状态
        async function resetPosition() {
            if (!confirm('确定要重置持仓状态吗？这将清除内存中的买入记录。')) return;
            
            try {
                await fetch('/api/doge', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ action: 'reset' })
                });
                addLog('持仓状态已重置', 'info');
                updateStatus();
            } catch (e) {
                addLog(`重置失败: ${e.message}`, 'error');
            }
        }

        // 页面初始化
        updateStatus();
        setInterval(updateStatus, 5000); // 每5秒更新一次状态
    </script>
</body>
</html>
