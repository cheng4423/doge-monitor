<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>DOGE AI 模拟交易</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      background: #0b0f1c;
      color: #fff;
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    button {
      margin: 5px;
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    .green { background:#00cc66; color:#fff; }
    .red { background:#ff4444; color:#fff; }
    .blue { background:#3366ff; color:#fff; }
    .card {
      background: #161b33;
      padding: 15px;
      border-radius: 12px;
      margin: 15px auto;
      max-width: 500px;
    }
    .signal-buy { color:#00ff88; }
    .signal-sell { color:#ff6666; }
    .signal-hold { color:#ffcc00; }
    #signal { font-size: 24px; font-weight: bold; margin: 10px 0; }
    #reason { font-size: 16px; color:#aaa; text-align: left; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 8px; }
    canvas { 
      background: #0f1329; 
      border-radius: 8px; 
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <h1>🐶 DOGE AI 模拟交易</h1>

  <!-- 价格卡片 -->
  <div class="card">
    <h2 id="price">$--</h2>
    <p id="change">涨幅: --%
  </div>

  <!-- 曲线图 -->
  <div class="card">
    <canvas id="chart" height="200"></canvas>
  </div>

  <!-- 🧠 AI 信号区 -->
  <div class="card">
    <h3>🧠 AI 分析结果</h3>
    <div id="signal" class="signal-hold">等待分析...</div>
    <p id="reason">正在连接欧易 API...</p>
    
    <!-- 分析指标 -->
    <div style="text-align:left; margin-top:10px; font-size:14px;">
      <div>📈 24H涨跌幅: <span id="changeVal">--</span>%</div>
      <div>📊 24H成交量: <span id="volume">--</span> 万</div>
      <div>🎯 24H最高: <span id="high">--</span></div>
      <div>🛡️ 24H最低: <span id="low">--</span></div>
    </div>
  </div>

  <!-- 控制面板 -->
  <div class="card">
    <button class="blue" onclick="fetchAISignal()">🚀 获取 AI 信号</button>
    <button class="green" onclick="execTrade()">📈 执行买入</button>
    <button class="red" onclick="execSell()">📉 执行卖出</button>
  </div>

  <!-- 结果日志 -->
  <div class="card">
    <h4>📋 交易日志</h4>
    <div id="log"></div>
  </div>

  <script>
    // 变量
    let chart;
    let priceHistory = [];
    let labels = [];
    let lastPrice = 0;
    let autoRefresh = null;

    // 1️⃣ 初始化图表
    function initChart() {
      const ctx = document.getElementById('chart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: 'DOGE 价格',
            data: priceHistory,
            borderColor: '#4da3ff',
            backgroundColor: 'rgba(77, 163, 255, 0.1)',
            tension: 0.4,
            fill: true
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: false, grid: { color: '#222' }, ticks: { color: '#aaa' } },
            x: { grid: { display: false }, ticks: { color: '#aaa' } }
          }
        }
      });
    }

    // 2️⃣ 获取价格和 AI 信号
    async function updatePrice() {
      try {
        const res = await fetch('/api/doge');
        const data = await res.json();
        
        if (!data.success) {
          addLog('❌ API 错误: ' + data.error);
          return;
        }
        
        const p = data.price;
        document.getElementById('price').innerText = '$' + p.toFixed(4);
        
        // 涨跌幅
        document.getElementById('change').innerText = data.change + '%';
        document.getElementById('change').style.color = data.change >= 0 ? '#00ff88' : '#ff6666';
        
        // 更新图表
        if (priceHistory.length > 30) {
          priceHistory.shift();
          labels.shift();
        }
        priceHistory.push(p);
        labels.push(new Date().toLocaleTimeString().slice(0,5));
        chart.update();
        
        lastPrice = p;
        
      } catch (e) {
        console.log('获取价格失败:', e);
      }
    }

    // 3️⃣ 🧠 AI 信号分析
    async function fetchAISignal() {
      try {
        const res = await fetch('/api/doge');
        const data = await res.json();
        
        if (!data.success) {
          addLog('❌ AI 分析失败: ' + data.error);
          return;
        }
        
        const signalEl = document.getElementById('signal');
        const reasonEl = document.getElementById('reason');
        
        // ✅ 使用后端返回的真实信号
        if (data.signal === 'BUY') {
          signalEl.innerText = '🔴 强烈买入';
          signalEl.className = 'signal-buy';
        } else if (data.signal === 'SELL') {
          signalEl.innerText = '🟢 建议卖出';
          signalEl.className = 'signal-sell';
        } else {
          signalEl.innerText = '🟡 继续观望';
          signalEl.className = 'signal-hold';
        }
        
        reasonEl.innerText = '💡 ' + data.reason;
        
        // 更新技术指标
        document.getElementById('changeVal').innerText = data.change;
        document.getElementById('volume').innerText = data.volume;
        document.getElementById('high').innerText = data.high;
        document.getElementById('low').innerText = data.low;
        
        addLog(`🧠 AI 信号: ${signalEl.innerText}`);
        
      } catch (e) {
        addLog('❌ AI 分析失败: ' + e.message);
      }
    }

    // 4️⃣ 执行交易
    async function execTrade() {
      const price = document.getElementById('price').innerText;
      addLog(`✅ 模拟买入 DOGE @ ${price}`);
    }
    
    async function execSell() {
      const price = document.getElementById('price').innerText;
      addLog(`✅ 模拟卖出 DOGE @ ${price}`);
    }

    // 5️⃣ 日志
    function addLog(msg) {
      const logEl = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      logEl.innerHTML = `<div>[${time}] ${msg}</div>` + logEl.innerHTML;
    }

    // 6️⃣ 启动
    initChart();
    updatePrice(); // 立即更新一次
    fetchAISignal(); // 立即分析一次
    autoRefresh = setInterval(() => {
      updatePrice();
      fetchAISignal();
    }, 8000); // 每8秒自动刷新
    
  </script>

</body>
</html>
